<!DOCTYPE html>
<html>
    <head>
        <title>Astro Explorer - Index</title>
        <!--Change the root url (<base> tag) so that both github pages and local host work-->
        <!--This is the url that will be added at the start of all import map entries-->
        <script>
            if (window.location.origin.includes('github.io')) { 
                //We are on github pages
                document.write("<base href='hvhs-tech.github.io/programming-project-GIT_PRINCIPIA'>");
            } else {
                //We are on localhost
                document.write("<base href=''>");
            }
        </script>
    </head>
    <body>

        
        
        <script type="importmap">
            {
                "imports": {
                    "@scripts/": "/scripts/"
                }
            }
        </script>

        <script type="module" src='scripts/core/main.mjs'></script>
    </body>
</html>
