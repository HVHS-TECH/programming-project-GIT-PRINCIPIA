<!DOCTYPE html>
<html>
    <head>
        <title>Astro Explorer - End Screen</title>
        <link rel="stylesheet" href="../css/styles.css">
        <base href="">
    </head>
    <body>

        <!--Avoid relative references exceeding max depth (of 2)-->
        <script type="importmap">
            {
                "imports": 
                {
                    "@scripts/": "/scripts/"
                }
            }
        </script>
        <!--Change the root url (<base> tag) so that both github pages and local host work-->
        <!--This is the url that will be added at the start of all import map entries-->
        <script>
            if (window.location.hostname.includes('github.io')) { 
                //We are on github pages
                document.head.innerHTML += '<base href="/programming-project-GIT-PRINCIPIA/">';
            } else {
                //We are on localhost
                document.head.innerHTML += '<base href="/">';
            }
        </script>
        <script type="module" src='../scripts/core/main.mjs'></script>
    </body>
</html>
